      - name: Red-team gate (threshold)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_redteam == 'true' }}
        shell: pwsh
        run: |
          $rt = "${{ github.event.inputs.redteam_threshold }}"
          if ([string]::IsNullOrWhiteSpace($rt)) { $rt = "0.75" }
          ./scripts/run-red-team.ps1 -EnvName "brk241-test" -FieldOpsThreshold ([double]$rt) -FibeyThreshold ([double]$rt)

      - name: Upload TEST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: artifacts
          if-no-files-found: ignore

  deploy-prod:
    name: Deploy + test + eval (PROD)
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: prod
    env:
      WEBIQ_API_KEY: ${{ secrets.WEBIQ_API_KEY }}
    steps:
