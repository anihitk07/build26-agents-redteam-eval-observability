          azd ai agent invoke fibey-coordinator --protocol responses --new-session --new-conversation "What active incidents do we have across all sites?"

      - name: Evaluation gate (threshold)
        shell: pwsh
        run: |
          $field = "${{ github.event.inputs.field_ops_threshold }}"
          if ([string]::IsNullOrWhiteSpace($field)) { $field = "0.70" }
          $fibey = "${{ github.event.inputs.fibey_threshold }}"
          if ([string]::IsNullOrWhiteSpace($fibey)) { $fibey = "0.70" }
